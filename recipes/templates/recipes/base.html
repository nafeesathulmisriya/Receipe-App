{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Tasty Recipes{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- ===== GLOBAL CSS FILES ===== -->
    <link rel="stylesheet" href="{% static 'recipes/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'recipes/css/owl.carousel.min.css' %}">
    <link rel="stylesheet" href="{% static 'recipes/css/font-awesome.min.css' %}">
    <link rel="stylesheet" href="{% static 'recipes/css/themify-icons.css' %}">
    <link rel="stylesheet" href="{% static 'recipes/css/slicknav.css' %}">
    <link rel="stylesheet" href="{% static 'recipes/css/style.css' %}">

    {% block extra_css %}{% endblock %}

    <!-- ===== CUSTOM STYLE FIX ===== -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            overflow-x: hidden;
        }

        /* ================= HEADER ================= */
        .header-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 90px;
            z-index: 999;
            display: flex;
            align-items: center;
        }

        .header-area .container {
            max-width: 100%;
            padding: 0 60px;
        }

        #navigation {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 35px;
            list-style: none;
            margin: 0;
        }

        #navigation li a {
            color: #597820;
            font-weight: 500;
            font-size: 16px;
            text-decoration: none;
            transition: 0.3s;
        }

        #navigation li a:hover {
            color: #ff4a52;
        }

        .ti-search {
            color: #ffffff;
            font-size: 18px;
            cursor: pointer;
        }

        /* ================= SLIDER FIX ================= */
        .slider_area {
            margin: 0;
            padding: 0;
        }

        .single_slider {
            height: 100vh;
            background-size: cover;
            background-position: center center;
            display: flex;
            align-items: center;
        }

        .slider_text h3 {
            color: #fff;
            font-size: 70px;
            font-weight: 600;
            line-height: 1.2;
        }

        /* ================= FOOTER ================= */
        footer {
            background: #111;
            color: #fff;
        }

        footer p {
            margin: 0;
        }
    </style>
</head>

<body>

<!-- ================= HEADER ================= -->
<header>
    <div class="header-area">
        <div class="container">
            <div class="row align-items-center">

                <!-- LOGO -->
                <div class="col-lg-3 col-6">
                    <a href="{% url 'recipes:index' %}">
                        <img src="{% static 'recipes/img/logo.png' %}" 
                             alt="Logo" 
                             style="max-height:60px;">
                    </a>
                </div>

                <!-- NAVIGATION -->
                <div class="col-lg-7 d-none d-lg-block text-end">
                    <nav>
                        <ul id="navigation">
                            <li><a href="{% url 'recipes:home' %}">Home</a></li>
                            <li><a href="{% url 'recipes:recipe_list' %}">Recipes</a></li>
                            <li><a href="{% url 'recipes:login' %}">Login</a></li>
                            <li><a href="{% url 'recipes:signup' %}">Signup</a></li>
                        </ul>
                    </nav>
                </div>

                <!-- SEARCH ICON -->
                <div class="col-lg-2 col-6 text-end">
                    <i class="ti-search"></i>
                </div>

            </div>
        </div>
    </div>
</header>

<!-- ================= PAGE CONTENT ================= -->
{% block content %}
{% endblock %}



<!-- ===== JS FILES ===== -->
<script src="{% static 'recipes/js/jquery-1.12.4.min.js' %}"></script>
<script src="{% static 'recipes/js/bootstrap.min.js' %}"></script>
<script src="{% static 'recipes/js/jquery.slicknav.min.js' %}"></script>
<script src="{% static 'recipes/js/main.js' %}"></script>

</body>
</html>
